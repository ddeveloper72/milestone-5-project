{% extends "base.html" %}
{% block content %}
<div class="mt-3">
    <div class="container">
        <h2>Blog Posts</h2>

        {% if posts %}
        <p>Posts found: {{ posts|length }}</p>
        {% for post in posts %}
        <div class="card mb-3">
            <h3>{{ post.title }}</h3>
            <p>{{ post.content|truncatewords:30 }}</p>
        </div>
        {% endfor %}
        {% else %}
        <p>There are no blog items logged yet</p>
        {% endif %}
    </div>
</div>
{% endblock content %}
