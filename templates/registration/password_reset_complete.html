{% extends "base.html" %}
{% load static %}

{% block title %}
Password reset complete
{% endblock %}

{% block content %}

<div class="container mt-5">
    <div class="col-sm-12">
        <div class="card">
            <div class="box">
                <div class="row">
                    <div class="col-sm-10">
                        <h4 class="card-header mb-2">Your Password is Reset:</h4>
                        <p>Your new password has been set successfully!</p>
                        <p>You can now log in with your new password.</p>
                    </div>
                    <div class="offset-sm-12">
                        <div class="mt-2 regform"><i class="fas fa-user-check"></i></div>
                    </div>
                </div>
                <div class="text-center mt-3 mb-3">
                    <a href="{% url 'login' %}" class="btn btn-primary">
                        <i class="fas fa-sign-in-alt"></i> Log In Now
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock content %}
